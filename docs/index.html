<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ксюшка</title>
  <style>
    :root {
      --bg-top: #ffd4ea;
      --bg-bottom: #ff9fcf;
      --card: rgba(255, 244, 250, 0.78);
      --text: #5a1840;
      --accent-a: #ff5da2;
      --accent-b: #ff85c2;
      --shadow: 0 24px 60px rgba(138, 45, 100, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.6), transparent 28%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    }

    .page {
      width: min(100%, 920px);
      border-radius: 32px;
      padding: 32px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: 0;
    }

    .page::before {
      width: 220px;
      height: 220px;
      right: -40px;
      top: -80px;
      background: rgba(255, 93, 162, 0.2);
    }

    .page::after {
      width: 180px;
      height: 180px;
      left: -50px;
      bottom: -70px;
      background: rgba(255, 133, 194, 0.22);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5rem);
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }

    p {
      margin: 12px 0 0;
      font-size: 1.05rem;
      max-width: 38rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 12px 24px rgba(45, 27, 61, 0.18);
    }

    button:hover {
      transform: translateY(-2px) scale(1.01);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .kinder {
      background: linear-gradient(135deg, #ff4f97, var(--accent-a));
    }

    .kartonka {
      background: linear-gradient(135deg, #ff6fb5, var(--accent-b));
    }

    .syazvit {
      background: linear-gradient(135deg, #ff8abf, #ff4f97);
    }

    .gift-kinder {
      background: linear-gradient(135deg, #ff5da2, #ff2d86);
    }

    .stage {
      margin-top: 30px;
      min-height: 220px;
      border-radius: 28px;
      padding: 24px;
      display: grid;
      align-items: end;
      background: linear-gradient(140deg, rgba(255, 250, 253, 0.96), rgba(255, 225, 241, 0.72));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
    }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      background: rgba(45, 27, 61, 0.08);
    }

    .message {
      margin-top: 14px;
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: 800;
      line-height: 1.05;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.98rem;
      opacity: 0.8;
    }

    .video-player {
      margin-top: 20px;
      width: min(100%, 420px);
      border-radius: 24px;
      background: #000;
      box-shadow: 0 18px 40px rgba(45, 27, 61, 0.24);
    }

    .video-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-start;
    }

    .heart-trail {
      position: fixed;
      left: 0;
      top: 0;
      font-size: 20px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      animation: float-heart 900ms ease-out forwards;
      will-change: transform, opacity;
    }

    @keyframes float-heart {
      0% {
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0.95;
      }

      100% {
        transform: translate(-50%, -95px) scale(1.35) rotate(12deg);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 22px;
      }

      .stage {
        min-height: 190px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <h1>ксюшка</h1>
      <p>Нажми на кнопку и выбери настроение ксюшки: сладкий <strong>киндер</strong> или загадочная <strong>картонка фли</strong>.</p>

      <div class="buttons">
        <button class="kinder" type="button" data-title="Киндер" data-text="Киндер." data-hint="Теплое, яркое и очень сладкое настроение." data-video="kinder-video.webm">Киндер</button>
        <button class="kartonka" type="button" data-title="Картонка Фли" data-text="Картонка фли." data-hint="Холодное, свежее и немного космическое настроение." data-video="kartonka-fli-video.webm">Картонка Фли</button>
        <button class="syazvit" type="button" data-title="Съязвить" data-text="Съязвить." data-hint="Острое и смешное настроение." data-video="syazvit-video.webm">Съязвить</button>
      </div>

      <section class="stage" id="stage">
        <span class="badge" id="badge">Старт</span>
        <div>
          <div class="message" id="message">Выбери кнопку</div>
          <div class="hint" id="hint">После нажатия здесь появится выбранное настроение.</div>
        </div>
        <video class="video-player" id="video-player" controls playsinline hidden></video>
        <div class="video-actions">
          <button class="gift-kinder" id="gift-kinder-button" type="button" data-title="Подарить 2 киндера" data-text="Подарить 2 киндера." data-hint="Очень добрый и сладкий подарок." data-video="kinder-video.webm" hidden>Подарить 2 киндера</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const badge = document.getElementById("badge");
    const message = document.getElementById("message");
    const hint = document.getElementById("hint");
    const videoPlayer = document.getElementById("video-player");
    const giftKinderButton = document.getElementById("gift-kinder-button");
    let lastHeartTime = 0;

    document.querySelectorAll("button").forEach((button) => {
      button.addEventListener("click", () => {
        const title = button.dataset.title;
        const text = button.dataset.text;
        const details = button.dataset.hint;
        const video = button.dataset.video;
        const isKinder = title === "Киндер" || title === "Подарить 2 киндера";
        const isKartonka = title === "Картонка Фли";
        const isSyazvit = title === "Съязвить";

        giftKinderButton.hidden = !isSyazvit && title !== "Подарить 2 киндера";

        badge.textContent = title;
        message.textContent = text;
        hint.textContent = details;
        if (isKinder) {
          stage.style.background = "linear-gradient(140deg, rgba(255, 231, 242, 0.97), rgba(255, 122, 185, 0.78))";
        } else if (isKartonka) {
          stage.style.background = "linear-gradient(140deg, rgba(255, 239, 247, 0.97), rgba(255, 154, 210, 0.8))";
        } else {
          stage.style.background = "linear-gradient(140deg, rgba(255, 229, 240, 0.97), rgba(255, 95, 165, 0.82))";
        }
        videoPlayer.pause();
        videoPlayer.src = video;
        videoPlayer.hidden = false;
        videoPlayer.load();
        videoPlayer.currentTime = 0;
        videoPlayer.play().catch(() => {});
      });
    });

    function spawnHeart(x, y) {
      const heart = document.createElement("span");
      const hearts = ["💗", "💖", "💕", "💞"];
      const colors = ["#ff4f97", "#ff77b7", "#ff99cd", "#ff5da2"];

      heart.className = "heart-trail";
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;
      heart.style.color = colors[Math.floor(Math.random() * colors.length)];

      document.body.appendChild(heart);
      window.setTimeout(() => heart.remove(), 900);
    }

    document.addEventListener("mousemove", (event) => {
      const now = Date.now();

      if (now - lastHeartTime < 35) {
        return;
      }

      lastHeartTime = now;
      spawnHeart(event.clientX, event.clientY);
    });
  </script>
</body>
</html>
